<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DabbahWala — Marketing Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; }
    header {
      background: #1a1a2e; color: white; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    header h1 { font-size: 1.25rem; }
    header a { color: #aaa; text-decoration: none; font-size: .9rem; }
    header a:hover { color: white; }
    main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    h2 { margin-bottom: 1.5rem; color: #1a1a2e; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .card {
      background: white; border-radius: 8px; padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card .label { font-size: .8rem; color: #888; text-transform: uppercase; letter-spacing: .05em; }
    .card .value { font-size: 2rem; font-weight: 700; margin-top: .25rem; color: #1a1a2e; }
  </style>
</head>
<body>
  <header>
    <h1>DabbahWala Marketing Operations</h1>
    <a href="/auth/logout">Sign out</a>
  </header>
  <main>
    <h2>Dashboard</h2>
    <div class="cards">
      <div class="card"><div class="label">Active Contacts</div><div class="value">—</div></div>
      <div class="card"><div class="label">New This Week</div><div class="value">—</div></div>
      <div class="card"><div class="label">Campaigns Running</div><div class="value">—</div></div>
      <div class="card"><div class="label">AI Cycles Today</div><div class="value">—</div></div>
    </div>
  </main>
</body>
</html>
